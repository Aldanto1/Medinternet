<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Medinternet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Загрузка -->
    <div id="loading" class="loading">Загрузка…</div>

    <!-- Экран регистрации -->
    <section id="screen-register" class="screen" hidden>
        <div class="card">
            <h1>Регистрация</h1>
            <p class="subtitle">Заполните данные, чтобы продолжить работу с Medinternet.</p>

            <form id="reg-form" novalidate>
                <label>
                    ФИО <span class="req">*</span>
                    <input type="text" name="full_name" id="full_name"
                           placeholder="Иванов Иван Иванович" autocomplete="name" required>
                </label>
                <label>
                    Телефон
                    <input type="tel" name="phone" id="phone"
                           placeholder="+7 900 000-00-00" autocomplete="tel" inputmode="tel">
                </label>
                <label>
                    Email
                    <input type="email" name="email" id="email"
                           placeholder="you@example.com" autocomplete="email" inputmode="email">
                </label>
                <label>
                    Дата рождения
                    <input type="date" name="birth_date" id="birth_date">
                </label>
                <p id="reg-error" class="error" hidden></p>
            </form>
        </div>
    </section>

    <!-- Экран чата с нейросетью -->
    <section id="screen-chat" class="screen" hidden>
        <header class="chat-header">
            <div class="chat-heading">
                <div class="chat-title">Медицинский ИИ-ассистент</div>
                <div class="chat-subtitle">RXCode AI</div>
            </div>
            <button id="chat-reset" class="reset-btn" type="button" title="Новый диалог">Новый диалог</button>
        </header>

        <div id="messages" class="messages"></div>

        <form id="chat-form" class="chat-form">
            <textarea id="chat-input" rows="1" placeholder="Задайте вопрос…" autocomplete="off"></textarea>
            <button type="submit" id="chat-send" class="send-btn" aria-label="Отправить">➤</button>
        </form>
    </section>

    <script src="/app.js"></script>
</body>
</html>
