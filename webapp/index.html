<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мединтернет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
          media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"></noscript>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="loading" class="loading"><div class="spinner"></div></div>

    <!-- Регистрация (для незарегистрированных) -->
    <section id="screen-register" class="screen" hidden>
        <div class="scroll">
            <div class="card">
                <img class="logo-img" src="/logo.png" alt="Мединтернет">
                <p class="subtitle">
                    Чтобы пользоваться медицинским поисковиком, зарегистрируйтесь.
                    На сайте <b>medinternet.ru</b> в личном кабинете есть ссылка
                    для регистрации в <b>Telegram</b>. Нажмите кнопку ниже, чтобы
                    перейти к регистрации.
                </p>
                <button id="register-btn" class="btn btn-primary" type="button">Зарегистрироваться</button>
            </div>
        </div>
    </section>

    <!-- Основное приложение (для зарегистрированных) -->
    <section id="app" class="screen" hidden>
        <!-- Медицинский поисковик -->
        <section id="page-search" class="page">
            <header class="topbar">
                <div class="topbar-title">Медицинский поисковик</div>
                <div class="topbar-actions">
                    <button id="chat-reset" class="btn-newchat" type="button">Новый чат</button>
                    <button id="history-btn" class="icon-round" type="button" title="История запросов" aria-label="История запросов">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13a9 9 0 1 0 2.6-6.36L3 8"/><path d="M12 7v5l3 1.5"/></svg>
                    </button>
                    <button class="icon-round theme-toggle" type="button" title="Сменить тему" aria-label="Сменить тему">🌙</button>
                </div>
            </header>
            <div id="messages" class="messages"></div>
            <form id="chat-form" class="chat-form">
                <textarea id="chat-input" rows="1" autocomplete="off" placeholder="Задайте вопрос…"></textarea>
                <button type="submit" id="chat-send" class="send-btn" aria-label="Отправить">➤</button>
            </form>
        </section>

        <!-- История: список чатов -->
        <section id="page-history" class="page" hidden>
            <header class="topbar">
                <button id="history-back" class="btn-back" type="button">← Назад</button>
                <div class="topbar-title">История</div>
                <div class="topbar-actions">
                    <button class="icon-round theme-toggle" type="button" title="Сменить тему" aria-label="Сменить тему">🌙</button>
                </div>
            </header>
            <div id="chat-list" class="chat-list"></div>
        </section>

        <!-- История: просмотр переписки выбранного чата -->
        <section id="page-chat-view" class="page" hidden>
            <header class="topbar">
                <button id="chat-view-back" class="btn-back" type="button">← Назад</button>
                <div id="chat-view-title" class="topbar-title ellipsis">Чат</div>
            </header>
            <div id="chat-view-messages" class="messages"></div>
        </section>
    </section>

    <script src="/app.js"></script>
</body>
</html>
