# Локальный запуск всего CRM-сервиса: Redis + API + воркер.
# Заполни .env (по образцу .env.example), затем:  docker-compose up --build
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  crm-api:
    build: .
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8090:8090"
    depends_on:
      - redis
    command: python -m app.main

  crm-worker:
    build: .
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    command: arq app.queue.worker.WorkerSettings
